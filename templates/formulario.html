<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: transparent; }
#cc { max-width: 620px; margin: 0 auto; padding: 0 0 24px; }
.hdr { background: #1A1A1A; border-top: 4px solid #7B35A0; border-radius: 10px 10px 0 0; padding: 28px 24px 22px; text-align: center; }
.hdr h1 { color: #fff; font-size: 22px; font-weight: 800; letter-spacing: 3px; margin: 0; }
.hdr p { color: #b89fc8; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin: 4px 0 0; }
.bdy { background: #fff; border: 1px solid #e0d0ea; border-top: none; border-radius: 0 0 10px 10px; padding: 28px 24px; }
.lbl { font-size: 12px; font-weight: 700; color: #5a2d7a; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.row { display: flex; gap: 12px; margin-bottom: 16px; align-items: stretch; }
#cpf {
  flex: 1; min-width: 0; padding: 18px 20px; font-size: 20px; font-weight: 600;
  border: 2px solid #c9a8e0; border-radius: 8px; color: #1a1a1a; background: #f9f5fc;
  outline: none; letter-spacing: 3px; height: 64px;
}
#cpf:focus { border-color: #7B35A0; }
#btn {
  padding: 0 36px; background: #7B35A0; color: #fff; font-size: 17px; font-weight: 700;
  border: none; border-radius: 8px; cursor: pointer; height: 64px; white-space: nowrap; flex-shrink: 0;
}
#btn:hover { background: #5a2080; }
#btn:disabled { background: #b89fc8; cursor: default; }
#msg { display: none; padding: 14px 16px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
.pedido { margin-top: 24px; border: 1px solid #e0d0ea; border-radius: 8px; overflow: hidden; }
.ph { background: #1A1A1A; padding: 14px 18px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.ph b { color: #c49fe0; font-size: 15px; }
.ph small { color: #888; font-size: 12px; }
.pi { background: #f9f5fc; padding: 14px 18px; display: flex; gap: 24px; flex-wrap: wrap; border-bottom: 1px solid #e0d0ea; }
.pi div label { display: block; font-size: 10px; color: #9966b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.pi div span { font-size: 13px; font-weight: 600; color: #1a1a1a; }
.tl { padding: 18px; }
.tl h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #9966b8; margin: 0 0 16px; }
.ev { display: flex; gap: 14px; padding-bottom: 16px; }
.evd { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.dot { width: 12px; height: 12px; border-radius: 50%; background: #e0d0ea; margin-top: 3px; }
.dot.on { background: #7B35A0; }
.line { width: 2px; flex: 1; background: #e0d0ea; margin-top: 4px; min-height: 20px; }
.evt .st { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.evt .dt { font-size: 12px; color: #9966b8; margin-top: 3px; }
@media (max-width:500px) { .row { flex-direction: column; } #btn { height: 52px; } }
</style>
</head>
<body>
<div id="cc">
  <div class="hdr">
    <h1>CASUAL COMFORT</h1>
    <p>Rastreamento de Pedido</p>
  </div>
  <div class="bdy">
    <div class="lbl">Digite seu CPF</div>
    <div class="row">
      <input id="cpf" type="tel" maxlength="14" placeholder="000.000.000-00" inputmode="numeric" autocomplete="off">
      <button id="btn" type="button">Rastrear</button>
    </div>
    <div id="msg"></div>
    <div id="res"></div>
  </div>
</div>

<script>
(function() {
  var API = 'https://web-production-c5e1d.up.railway.app';
  var cpf = document.getElementById('cpf');
  var btn = document.getElementById('btn');
  var msg = document.getElementById('msg');
  var res = document.getElementById('res');

  function sendH() {
    try { parent.postMessage({ ccHeight: document.body.scrollHeight }, '*'); } catch(e) {}
  }

  cpf.addEventListener('input', function() {
    var v = this.value.replace(/[^0-9]/g, '').slice(0, 11);
    if (v.length > 9)      v = v.slice(0,3) + '.' + v.slice(3,6) + '.' + v.slice(6,9) + '-' + v.slice(9);
    else if (v.length > 6) v = v.slice(0,3) + '.' + v.slice(3,6) + '.' + v.slice(6);
    else if (v.length > 3) v = v.slice(0,3) + '.' + v.slice(3);
    this.value = v;
  });

  cpf.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') buscar();
  });

  btn.addEventListener('click', buscar);

  function showMsg(t, tipo) {
    msg.textContent = t;
    msg.style.display = 'block';
    msg.style.background = tipo === 'erro' ? '#fdf0f0' : '#f5f0ff';
    msg.style.color      = tipo === 'erro' ? '#8B1A1A' : '#4a1a6a';
    msg.style.border     = tipo === 'erro' ? '1px solid #f0c0c0' : '1px solid #c9a8e0';
    setTimeout(sendH, 100);
  }

  function fmt(s) {
    if (!s) return '';
    try {
      var d = new Date(s.replace(' ', 'T'));
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    } catch(e) { return s; }
  }

  function buscar() {
    var num = cpf.value.replace(/[^0-9]/g, '');
    msg.style.display = 'none';
    res.innerHTML = '';
    if (num.length !== 11) { showMsg('Digite um CPF valido com 11 digitos.', 'erro'); return; }
    btn.disabled = true;
    btn.textContent = 'Buscando...';
    var xhr = new XMLHttpRequest();
    xhr.open('GET', API + '/rastrear?cpf=' + num, true);
    xhr.onreadystatechange = function() {
      if (xhr.readyState !== 4) return;
      btn.disabled = false;
      btn.textContent = 'Rastrear';
      var data;
      try { data = JSON.parse(xhr.responseText); } catch(ex) { showMsg('Erro de conexao. Tente novamente.', 'erro'); return; }
      if (xhr.status !== 200) { showMsg(data.erro || 'Erro ao buscar.', 'erro'); return; }
      var pedidos = data.pedidos || [];
      if (!pedidos.length) { showMsg('Nenhum pedido encontrado para este CPF.', 'erro'); return; }
      var html = '';
      for (var i = 0; i < pedidos.length; i++) {
        var p = pedidos[i], ev = '';
        if (p.eventos && p.eventos.length) {
          for (var j = 0; j < p.eventos.length; j++) {
            var e = p.eventos[j];
            ev += '<div class="ev">'
              + '<div class="evd"><div class="dot' + (j === 0 ? ' on' : '') + '"></div><div class="line"></div></div>'
              + '<div class="evt"><div class="st">' + (e.status || '-') + '</div>'
              + '<div class="dt">' + fmt(e.data) + (e.local ? ' - ' + e.local : '') + '</div></div></div>';
          }
        } else {
          ev = '<div style="text-align:center;color:#9966b8;padding:16px 0;">Aguardando movimentacao</div>';
        }
        html += '<div class="pedido">'
          + '<div class="ph"><b>Pedido #' + p.numero + '</b><small>' + (p.data ? 'Realizado em ' + fmt(p.data) : '') + '</small></div>'
          + '<div class="pi">'
          + '<div><label>Status</label><span>' + (p.status || '-') + '</span></div>'
          + (p.rastreio ? '<div><label>Rastreio</label><span style="font-family:monospace;color:#5a2d7a;">' + p.rastreio + '</span></div>' : '')
          + (p.cidade   ? '<div><label>Destino</label><span>' + p.cidade + '</span></div>' : '')
          + '</div>'
          + '<div class="tl"><h3>Historico</h3>' + ev + '</div>'
          + '</div>';
      }
      res.innerHTML = html;
      setTimeout(sendH, 100);
    };
    xhr.send();
  }

  sendH();
  setTimeout(sendH, 500);
})();
</script>
</body>
</html>
