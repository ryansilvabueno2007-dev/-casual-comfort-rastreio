<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rastreie seu Pedido – Casual Comfort</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #F5F0EB;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
.card {
  width: 100%;
  max-width: 580px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 32px rgba(0,0,0,0.12);
}
.card-topo {
  background: #1B1309;
  border-top: 4px solid #B87333;
  padding: 32px 28px 24px;
  text-align: center;
}
.card-topo h1 {
  color: #B87333;
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.card-topo p {
  color: #A09080;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
}
.card-corpo {
  background: #fff;
  padding: 32px 28px;
}
label.lbl {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: #6B5B4E;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.linha-input {
  display: flex;
  gap: 10px;
}
#cpf {
  flex: 1;
  padding: 16px 18px;
  font-size: 20px;
  font-weight: 600;
  border: 2px solid #E2D5C8;
  border-radius: 8px;
  color: #1A1210;
  background: #F5F0EB;
  outline: none;
  letter-spacing: 3px;
  -webkit-appearance: none;
}
#cpf:focus { border-color: #B87333; }
#btn {
  padding: 0 28px;
  background: #B87333;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  height: 60px;
  white-space: nowrap;
  -webkit-appearance: none;
}
#btn:hover { background: #8B5A20; }
#btn:disabled { background: #A09080; cursor: default; }
#msg {
  display: none;
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 6px;
  font-size: 14px;
}
#msg.erro { background: #fdf0f0; color: #8B1A1A; border: 1px solid #f0c0c0; }
#msg.info { background: #f0f7f4; color: #1A5C3A; border: 1px solid #b0dcc8; }
.pedido {
  margin-top: 24px;
  border: 1px solid #E2D5C8;
  border-radius: 8px;
  overflow: hidden;
}
.ped-topo {
  background: #1B1309;
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.ped-topo strong { color: #B87333; font-size: 15px; }
.ped-topo small  { color: #A09080; font-size: 12px; }
.ped-info {
  background: #F5F0EB;
  padding: 14px 18px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  border-bottom: 1px solid #E2D5C8;
}
.info { display: flex; flex-direction: column; gap: 2px; }
.info span.titulo { font-size: 10px; color: #A09080; text-transform: uppercase; letter-spacing: 1px; }
.info span.valor  { font-size: 13px; font-weight: 600; color: #1A1210; }
.timeline { padding: 18px; }
.timeline h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #A09080; margin-bottom: 14px; }
.evento { display: flex; gap: 12px; padding-bottom: 14px; }
.evento:last-child { padding-bottom: 0; }
.ev-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.dot { width: 11px; height: 11px; border-radius: 50%; background: #E2D5C8; margin-top: 3px; }
.dot.ativo { background: #B87333; }
.fio { width: 2px; flex: 1; background: #E2D5C8; margin-top: 3px; min-height: 18px; }
.evento:last-child .fio { display: none; }
.ev-desc strong { display: block; font-size: 13px; color: #1A1210; }
.ev-desc small   { font-size: 11px; color: #A09080; }
.sem-eventos { text-align: center; color: #A09080; font-size: 13px; padding: 12px 0; }
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 480px) {
  .linha-input { flex-direction: column; }
  #btn { height: 52px; width: 100%; }
}
</style>
</head>
<body>

<div class="card">
  <div class="card-topo">
    <h1>CASUAL COMFORT</h1>
    <p>Rastreamento de Pedido</p>
  </div>
  <div class="card-corpo">
    <label class="lbl" for="cpf">Digite seu CPF</label>
    <div class="linha-input">
      <input id="cpf" type="tel" maxlength="14" placeholder="000.000.000-00" inputmode="numeric" autocomplete="off">
      <button id="btn" onclick="buscar()">Rastrear</button>
    </div>
    <div id="msg"></div>
    <div id="resultado"></div>
  </div>
</div>

<script>
var cpfEl = document.getElementById('cpf');
var btn   = document.getElementById('btn');
var msg   = document.getElementById('msg');
var res   = document.getElementById('resultado');

cpfEl.addEventListener('input', function() {
  var v = this.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 9)      v = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6,9)+'-'+v.slice(9);
  else if (v.length > 6) v = v.slice(0,3)+'.'+v.slice(3,6)+'.'+v.slice(6);
  else if (v.length > 3) v = v.slice(0,3)+'.'+v.slice(3);
  this.value = v;
});

cpfEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscar();
});

function mostrarMsg(texto, tipo) {
  msg.textContent = texto;
  msg.className = tipo;
  msg.style.display = 'block';
}

function fmtData(s) {
  if (!s) return '';
  try {
    var d = new Date(s.replace(' ', 'T'));
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return s; }
}

function renderPedido(p) {
  var evHtml = '';
  if (p.eventos && p.eventos.length) {
    for (var i = 0; i < p.eventos.length; i++) {
      var e = p.eventos[i];
      evHtml += '<div class="evento">'
        + '<div class="ev-col"><div class="dot'+(i===0?' ativo':'')+'"></div><div class="fio"></div></div>'
        + '<div class="ev-desc"><strong>'+(e.status||'—')+'</strong>'
        + '<small>'+fmtData(e.data)+(e.local?' · '+e.local:'')+'</small></div>'
        + '</div>';
    }
  } else if (p.rastreio) {
    var urlJT = 'https://www.jtexpress.com.br/trajectoryQuery?bills=' + p.rastreio;
    evHtml = '<div class="sem-eventos" style="text-align:left">'
      + '<p style="margin-bottom:12px;color:#6B5B4E">Clique abaixo para ver o histórico completo de movimentações:</p>'
      + '<a href="'+urlJT+'" target="_blank" rel="noopener" style="display:inline-block;background:#B87333;color:#fff;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:14px;">Rastrear na JT Express →</a>'
      + '</div>';
  } else {
    evHtml = '<div class="sem-eventos">Aguardando código de rastreio</div>';
  }

  return '<div class="pedido">'
    + '<div class="ped-topo"><strong>Pedido #'+p.numero+'</strong>'
    + '<small>'+(p.data ? 'Realizado em '+fmtData(p.data) : '')+'</small></div>'
    + '<div class="ped-info">'
    + '<div class="info"><span class="titulo">Status</span><span class="valor">'+(p.status||'—')+'</span></div>'
    + (p.rastreio ? '<div class="info"><span class="titulo">Rastreio</span><span class="valor" style="font-family:monospace;color:#8B5A20">'+p.rastreio+'</span></div>' : '')
    + (p.cidade   ? '<div class="info"><span class="titulo">Destino</span><span class="valor">'+p.cidade+'</span></div>' : '')
    + '</div>'
    + (p.rastreio ? '<div class="timeline"><h4>Histórico</h4>'+evHtml+'</div>' : '')
    + '</div>';
}

function buscar() {
  var num = cpfEl.value.replace(/\D/g, '');
  msg.style.display = 'none';
  res.innerHTML = '';
  if (num.length !== 11) { mostrarMsg('Digite um CPF válido com 11 dígitos.', 'erro'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Buscando...';

  var xhr = new XMLHttpRequest();
  xhr.open('GET', '/rastrear?cpf=' + num, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    btn.disabled = false;
    btn.textContent = 'Rastrear';
    var data;
    try { data = JSON.parse(xhr.responseText); } catch(ex) {
      mostrarMsg('Erro de conexão. Tente novamente.', 'erro'); return;
    }
    if (xhr.status !== 200) { mostrarMsg(data.erro || 'Erro ao buscar.', 'erro'); return; }
    var pedidos = data.pedidos || [];
    if (!pedidos.length) { mostrarMsg('Nenhum pedido encontrado para este CPF.', 'erro'); return; }
    var html = '';
    for (var i = 0; i < pedidos.length; i++) html += renderPedido(pedidos[i]);
    res.innerHTML = html;
  };
  xhr.send();
}
</script>
</body>
</html>
